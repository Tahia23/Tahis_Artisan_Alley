<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Tahi's Artisan Alley</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <header>
        <div class="navbar">
            <div class="logo-area">
                <img src="../images/logo.png" alt="Logo" class="logo">
                <h1>Tahi's Artisan Alley</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="cotton-dresses.html">Cotton Ready Dress</a></li>
                    <li><a href="skin-care.html">Skin Care</a></li>
                    <li><a href="bags.html">Bags</a></li>
                    <li><a href="accessories.html">Accessories</a></li>
                    <li><a href="cart.html">Cart</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="cart-container">
        <div class="checkout-box">
            <h2>Shipping Details</h2>
            <!-- আইডি যোগ করা হয়েছে -->
            <form id="checkout-form">
                <div class="form-group">
                    <label>Customer Name</label>
                    <input type="text" id="cust-name" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="cust-phone" placeholder="Enter your phone number" required>
                </div>
                <div class="form-group">
                    <label>Delivery Address</label>
                    <textarea rows="4" id="cust-address" placeholder="Enter your complete address" required></textarea>
                </div>
                <button type="submit" class="btn" style="width: 100%; border: none; cursor: pointer;">Place Order</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Tahi's Artisan Alley. All Rights Reserved.</p>
    </footer>

    <!-- ডাটা পাঠানোর স্ক্রিপ্ট -->
    <script>
        document.getElementById('checkout-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            if (cart.length === 0) {
                alert("Your cart is empty!");
                return;
            }

            const orderData = {
                name: document.getElementById('cust-name').value,
                phone: document.getElementById('cust-phone').value,
                address: document.getElementById('cust-address').value,
                items: cart,
                total: "Calculated at server" // সার্ভারে টোটাল ক্যালকুলেট করাই ভালো
            };

            try {
                const response = await fetch('https://tahis-artisan-alley.onrender.com/place-order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });

                if (response.ok) {
                    alert("Order placed successfully!");
                    localStorage.removeItem('cart');
                    window.location.href = '../index.html';
                } else {
                    alert("Failed to place order. Please try again.");
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Server connection failed!");
            }
        });
    </script>
</body>
</html>
