<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Tahi's Artisan Alley</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <header>
        <div class="navbar">
            <div class="logo-area">
                <img src="../images/logo.png" alt="Logo" class="logo">
                <h1>Tahi's Artisan Alley</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="cotton-dresses.html">Cotton Ready Dress</a></li>
                    <li><a href="skin-care.html">Skin Care</a></li>
                    <li><a href="bags.html">Bags</a></li>
                    <li><a href="accessories.html">Accessories</a></li>
                    <li><a href="cart.html">Cart</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="cart-container">
        <div class="checkout-box">
            <h2>Shipping Details</h2>
            <form>
                <div class="form-group">
                    <label>Customer Name</label>
                    <input type="text" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" placeholder="Enter your phone number" required>
                </div>
                <div class="form-group">
                    <label>Delivery Address</label>
                    <textarea rows="4" placeholder="Enter your complete address" required></textarea>
                </div>
                <button type="submit" class="btn" style="width: 100%; border: none; cursor: pointer;">Place Order</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Tahi's Artisan Alley. All Rights Reserved.</p>
    </footer>

</body>
</html>
