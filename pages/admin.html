<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Tahi's Artisan Alley</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .admin-container { margin: 20px; }
        .product-list-box { margin-top: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    </style>
</head>
<body>

    <header>
        <div class="navbar">
            <div class="logo-area">
                <h1>Admin Dashboard</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="../index.html">View Site</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="admin-container">
        <div class="form-box">
            <h2>Add New Product</h2>
            <form id="productForm">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" name="name" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select name="category" required>
                        <option value="cotton">Cotton Ready Dress</option>
                        <option value="skincare">Skin Care</option>
                        <option value="bags">Bags</option>
                        <option value="accessories">Accessories</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Price (BDT)</label>
                    <input type="number" name="price" required>
                </div>
                <div class="form-group">
                    <label>Image Name (e.g., s5.jpg)</label>
                    <input type="text" name="image" required>
                </div>
                <button type="submit" class="btn">Upload Product</button>
            </form>
        </div>

        <div class="product-list-box">
            <h2>Current Products</h2>
            <table id="product-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="product-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
    // প্রোটেকশন চেক (অ্যাডমিন ছাড়া কেউ ঢুকতে পারবে না)
    if (localStorage.getItem('userEmail') !== 'tahiasima023@gmail.com') {
        alert("Access Denied! Only for Admin.");
        window.location.href = '/'; // সাধারণ ইউজারকে হোম পেজে পাঠিয়ে দিবে
    }

    // প্রোডাক্টি লোড করার কোড... (বাকি কোডগুলো এর নিচে থাকবে)

        async function loadProducts() {
            const response = await fetch('https://tahis-artisan-alley.onrender.com/get-products');
            const data = await response.json();
            const body = document.getElementById('product-body');
            body.innerHTML = ''; // খালি করে নেওয়া
            
            data.forEach(product => {
                body.innerHTML += `
                    <tr>
                        <td>${product.name}</td>
                        <td>${product.category}</td>
                        <td><button onclick="deleteProduct('${product._id}')">Delete</button></td>
                    </tr>
                `;
            });
        }

        // ডিলিট করার কোড
        async function deleteProduct(id) {
            if(confirm("প্রোডাক্টটি ডিলিট করতে চান?")) {
                await fetch(`https://tahis-artisan-alley.onrender.com/delete-product/${id}`, { method: 'DELETE' });
                loadProducts(); // ডিলিট হওয়ার পর আবার লিস্ট আপডেট করবে
            }
        }

        // অ্যাড করার কোড
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const productData = Object.fromEntries(formData.entries());

            await fetch('https://tahis-artisan-alley.onrender.com/add-product', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(productData)
            });
            alert('Product Added!');
            e.target.reset();
            loadProducts(); // নতুন ডাটা আসার পর লিস্ট রিফ্রেশ হবে
        });

        loadProducts(); // পেজ ওপেন হলেই সব প্রোডাক্ট দেখাবে
    </script>
</body>
</html>
