<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Tahi's Artisan Alley</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <header>
        <div class="navbar">
            <div class="logo-area">
                <img src="../images/logo.png" alt="Logo" class="logo">
                <h1>Admin Dashboard</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="../index.html">View Site</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="admin-container">
        <div class="form-box">
            <h2>Add New Product</h2>
            <form>
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" placeholder="Enter product name" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select required>
                        <option value="cotton">Cotton Ready Dress</option>
                        <option value="skincare">Skin Care</option>
                        <option value="bags">Bags</option>
                        <option value="accessories">Accessories</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Price (BDT)</label>
                    <input type="number" placeholder="Enter price" required>
                </div>
                <div class="form-group">
                    <label>Product Image</label>
                    <input type="file" required>
                </div>
                <button type="submit" class="btn" style="width: 100%; border: none; cursor: pointer;">Upload Product</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Tahi's Artisan Alley. All Rights Reserved.</p>
    </footer>

</body>
</html>
